<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipar — Yeni Sekme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 40px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 12px 20px;
      width: 600px;
      max-width: 90vw;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: #58a6ff;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e6edf3;
      font-size: 16px;
    }

    .shield-status {
      margin-top: 32px;
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #8b949e;
    }

    .shield-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }
  </style>
</head>
<body>
  <div class="logo">🛡️</div>
  <div class="brand">SİPAR</div>
  <div class="tagline">Kalkanın arkasında sörf yap</div>

  <div class="search-box">
    <span>🔍</span>
    <input type="text" placeholder="Ara veya adres gir..." autofocus
      onkeydown="if(event.key==='Enter') window.location.href='https://search.brave.com/search?q='+encodeURIComponent(this.value)">
  </div>

  <div class="shield-status">
    <div class="shield-item"><div class="dot"></div> Tracker engelleme aktif</div>
    <div class="shield-item"><div class="dot"></div> DNS: Quad9</div>
    <div class="shield-item"><div class="dot"></div> Telemetry kapalı</div>
  </div>
</body>
</html>
