<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipar — Yeni Sekme</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Saat -->
  <div class="clock" id="clock"></div>

  <!-- Logo -->
  <div class="hero">
    <div class="logo-icon">🛡️</div>
    <div class="brand-name">Sipar</div>
    <div class="tagline">Kalkanın arkasında sörf yap</div>
  </div>

  <!-- Arama -->
  <div class="search-container">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Ara veya adres gir..."
        autofocus
      >
    </div>
  </div>

  <!-- Gizlilik durumu -->
  <div class="shield-status">
    <div class="shield-item">
      <div class="status-dot" id="tracker-dot"></div>
      <span id="tracker-text">Tracker engelleme aktif</span>
    </div>
    <div class="shield-item">
      <div class="status-dot"></div>
      <span>DNS: Quad9</span>
    </div>
    <div class="shield-item">
      <div class="status-dot"></div>
      <span>Telemetry kapalı</span>
    </div>
  </div>

  <!-- Kısayollar (Faz 2) -->
  <!--
  <div class="shortcuts">
    <a class="shortcut" href="https://github.com">
      <span class="shortcut-icon">🐙</span>
      <span class="shortcut-name">GitHub</span>
    </a>
  </div>
  -->

  <script>
    // Arama
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value.trim();
        if (!query) return;
        
        // URL mi yoksa arama mı?
        const isUrl = /^https?:\/\//.test(query) || /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(query);
        
        if (isUrl) {
          window.location.href = query.startsWith('http') ? query : 'https://' + query;
        } else {
          // Brave Search — gizlilik odaklı
          window.location.href = 'https://search.brave.com/search?q=' + encodeURIComponent(query);
        }
      }
    });

    // Saat
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
